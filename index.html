<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여주시 농촌공간계획 성과지표</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    /* ── Dark Mode Design Tokens ── */
    :root {
      --bg:       #0B0F19;
      --surface:  #131825;
      --elevated: #1A2035;
      --glass:    rgba(26, 32, 53, 0.7);
      --text:     #E2E6EF;
      --text-dim: #A0A8B8;
      --sub:      #636E82;
      --divider:  rgba(255,255,255,0.06);
      --glow:     rgba(58,107,197,0.15);

      --primary:  #5B8DEF;
      --positive: #3DBEA0;
      --caution:  #E4A853;
      --negative: #E06060;
      --accent:   #9B8ADE;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--divider);
      color: var(--text);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      backdrop-filter: blur(12px);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .badge {
      background: var(--elevated);
      border: 1px solid var(--divider);
      padding: 3px 12px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
    }
    .header-sub {
      font-size: 13px;
      color: var(--sub);
      font-weight: 500;
    }

    /* ── Main ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ── Section Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--divider);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .panel h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--divider);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Filter ── */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--divider);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .filter-count {
      font-size: 12px;
      color: var(--sub);
      margin-left: auto;
    }
    .chip {
      font-family: 'Pretendard', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: var(--elevated);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); background: rgba(91,141,239,0.08); }
    .chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 0 16px rgba(91,141,239,0.3);
    }
    .chip-all {
      font-family: 'Pretendard', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: var(--elevated);
      color: var(--sub);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip-all:hover { background: rgba(255,255,255,0.05); color: var(--text-dim); }
    .chip-all.active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
    }

    /* ── Summary Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--divider);
      border-radius: 14px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
    }
    .card .label { font-size: 12px; color: var(--sub); font-weight: 500; margin-bottom: 8px; }
    .card .value { font-size: 28px; font-weight: 700; }
    .card .unit { font-size: 13px; font-weight: 400; color: var(--sub); margin-left: 2px; }

    .card--primary::before  { background: linear-gradient(90deg, var(--primary), transparent); }
    .card--primary .value   { color: var(--primary); }
    .card--caution::before  { background: linear-gradient(90deg, var(--caution), transparent); }
    .card--caution .value   { color: var(--caution); }
    .card--positive::before { background: linear-gradient(90deg, var(--positive), transparent); }
    .card--positive .value  { color: var(--positive); }
    .card--negative::before { background: linear-gradient(90deg, var(--negative), transparent); }
    .card--negative .value  { color: var(--negative); }
    .card--accent::before   { background: linear-gradient(90deg, var(--accent), transparent); }
    .card--accent .value    { color: var(--accent); }

    /* ── 2-Column Grid ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* ── Map ── */
    #map { height: 380px; border-radius: 10px; }
    .leaflet-tile-pane { filter: brightness(0.7) saturate(0.8) contrast(1.1); }
    .leaflet-control-attribution { background: rgba(11,15,25,0.7) !important; color: var(--sub) !important; }
    .leaflet-control-attribution a { color: var(--sub) !important; }

    /* ── Chart ── */
    .chart-wrap canvas { width: 100% !important; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--sub);
      background: var(--elevated);
      padding: 10px 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    th:first-child { border-radius: 8px 0 0 0; }
    th:last-child { border-radius: 0 8px 0 0; }
    td {
      padding: 11px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--divider);
      color: var(--text-dim);
    }
    tr:hover td { background: rgba(91,141,239,0.05); color: var(--text); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Full-width row ── */
    .full-row { margin-bottom: 20px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      header { padding: 0 16px; height: 56px; }
      header h1 { font-size: 17px; }
      .header-sub { display: none; }
      main { padding: 16px 12px 40px; }
    }
    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>여주시 농촌공간계획 성과지표</h1>
    <span class="badge" id="badgeCount">8개 읍면</span>
  </div>
  <span class="header-sub">읍면별 인구 / 고령화율 / 사업체 / 빈집 / 의료시설</span>
</header>

<main>
  <!-- Filter -->
  <div class="filter-bar">
    <span class="filter-label">읍면 선택</span>
    <div id="filterChips" style="display:contents"></div>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <!-- Summary Cards -->
  <div class="cards" id="cards"></div>

  <!-- Row 1: Map + Table -->
  <div class="grid-2">
    <div class="panel">
      <h2>읍면 위치</h2>
      <div id="map"></div>
    </div>
    <div class="panel">
      <h2>상세 데이터</h2>
      <div style="overflow-x:auto;max-height:424px;overflow-y:auto">
        <table id="dataTable">
          <thead>
            <tr>
              <th>읍면</th>
              <th class="num">인구 (명)</th>
              <th class="num">고령화율 (%)</th>
              <th class="num">사업체 수</th>
              <th class="num">빈집 수</th>
              <th class="num">의료시설</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Row 2: Population Chart + Elderly Chart -->
  <div class="grid-2">
    <div class="panel chart-wrap">
      <h2>읍면별 인구</h2>
      <canvas id="popChart"></canvas>
    </div>
    <div class="panel chart-wrap">
      <h2>읍면별 고령화율</h2>
      <canvas id="elderlyChart"></canvas>
    </div>
  </div>

  <!-- Row 3: Business + Vacant House -->
  <div class="grid-2">
    <div class="panel chart-wrap">
      <h2>읍면별 사업체 수</h2>
      <canvas id="bizChart"></canvas>
    </div>
    <div class="panel chart-wrap">
      <h2>읍면별 빈집 수</h2>
      <canvas id="vacantChart"></canvas>
    </div>
  </div>

  <!-- Row 4: Medical Facility (full width) -->
  <div class="panel chart-wrap full-row">
    <h2>읍면별 의료시설 수</h2>
    <canvas id="medicalChart" style="max-height:260px"></canvas>
  </div>
</main>

<script>
// ── Dark Mode Design Tokens ──
const C = {
  primary:  '#5B8DEF',
  positive: '#3DBEA0',
  caution:  '#E4A853',
  negative: '#E06060',
  accent:   '#9B8ADE',
  text:     '#E2E6EF',
  textDim:  '#A0A8B8',
  sub:      '#636E82',
  grid:     'rgba(255,255,255,0.04)',
};

let DATA = [];
const selected = new Set();

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const cols = line.split(',');
    const row = {};
    headers.forEach((h, i) => row[h.trim()] = cols[i].trim());
    return row;
  });
}

async function loadData() {
  const res = await fetch('data.csv');
  const text = await res.text();
  const rows = parseCSV(text);

  DATA = rows.map(r => ({
    name: r.name,
    population: Number(r.population),
    elderlyRatio: Number(r.elderly_ratio),
    business: Number(r.business_count),
    vacantHouse: Number(r.vacant_house),
    medical: Number(r.medical_facility),
    lat: Number(r.lat),
    lng: Number(r.lng),
  }));

  DATA.forEach(d => selected.add(d.name));

  buildChips();
  initMap();
  renderAll();
}

// ── Filter Chips ──
const chipsEl = document.getElementById('filterChips');
const countEl = document.getElementById('filterCount');
const badgeEl = document.getElementById('badgeCount');

function buildChips() {
  chipsEl.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'chip-all' + (selected.size === DATA.length ? ' active' : '');
  allBtn.textContent = '전체';
  allBtn.addEventListener('click', () => {
    if (selected.size === DATA.length) return;
    DATA.forEach(d => selected.add(d.name));
    buildChips();
    renderAll();
  });
  chipsEl.appendChild(allBtn);

  DATA.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (selected.has(d.name) ? ' active' : '');
    btn.textContent = d.name;
    btn.addEventListener('click', () => {
      if (selected.has(d.name)) {
        if (selected.size <= 1) return;
        selected.delete(d.name);
      } else {
        selected.add(d.name);
      }
      buildChips();
      renderAll();
    });
    chipsEl.appendChild(btn);
  });

  const n = selected.size;
  const total = DATA.length;
  countEl.textContent = n === total ? `${total}개 전체` : `${n}/${total}개 선택`;
  badgeEl.textContent = n === total ? `${total}개 읍면` : `${n}개 읍면 선택`;
}

function getFiltered() {
  return DATA.filter(d => selected.has(d.name));
}

// ── Map (Dark tile) ──
let map, markerLayer;

function initMap() {
  map = L.map('map').setView([37.295, 127.635], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);

  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function () {
    const div = L.DomUtil.create('div');
    div.style.cssText = 'background:rgba(19,24,37,0.9);padding:10px 14px;border-radius:8px;font-size:11px;font-family:Pretendard,sans-serif;border:1px solid rgba(255,255,255,0.06);line-height:1.9;backdrop-filter:blur(8px)';
    div.innerHTML = '<b style="color:' + C.textDim + '">고령화율</b><br>'
      + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + C.primary + ';margin-right:6px"></span><span style="color:' + C.sub + '">25% 미만</span><br>'
      + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + C.caution + ';margin-right:6px"></span><span style="color:' + C.sub + '">25~30%</span><br>'
      + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + C.negative + ';margin-right:6px"></span><span style="color:' + C.sub + '">30% 이상</span>';
    return div;
  };
  legend.addTo(map);
}

// ── Charts ──
Chart.defaults.font.family = 'Pretendard, Malgun Gothic, sans-serif';
Chart.defaults.color = C.sub;
let popChart, elderlyChart, bizChart, vacantChart, medicalChart;

function elderlyColor(ratio) {
  return ratio >= 30 ? C.negative : ratio >= 25 ? C.caution : C.primary;
}

function renderAll() {
  const filtered = getFiltered();
  const sorted = [...filtered].sort((a, b) => b.population - a.population);

  // Summary Cards
  const totalPop = filtered.reduce((s, d) => s + d.population, 0);
  const avgElderly = (filtered.reduce((s, d) => s + d.elderlyRatio, 0) / filtered.length).toFixed(1);
  const totalBiz = filtered.reduce((s, d) => s + d.business, 0);
  const totalVacant = filtered.reduce((s, d) => s + d.vacantHouse, 0);
  const totalMedical = filtered.reduce((s, d) => s + d.medical, 0);

  document.getElementById('cards').innerHTML = [
    { label: '총 인구',      value: totalPop.toLocaleString(), unit: '명', cls: 'card--primary' },
    { label: '평균 고령화율', value: avgElderly,                unit: '%',  cls: 'card--caution' },
    { label: '총 사업체 수',  value: totalBiz.toLocaleString(), unit: '개', cls: 'card--positive' },
    { label: '총 빈집 수',   value: totalVacant.toLocaleString(), unit: '채', cls: 'card--negative' },
    { label: '의료시설 수',  value: totalMedical.toLocaleString(), unit: '개소', cls: 'card--accent' },
    { label: '선택 읍면',     value: filtered.length,           unit: '개', cls: 'card--accent' },
  ].map(c => `
    <div class="card ${c.cls}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}<span class="unit">${c.unit}</span></div>
    </div>
  `).join('');

  // Map Markers
  markerLayer.clearLayers();
  const maxPop = Math.max(...DATA.map(d => d.population));
  filtered.forEach(d => {
    const radius = 8 + (d.population / maxPop) * 22;
    const col = elderlyColor(d.elderlyRatio);
    L.circleMarker([d.lat, d.lng], {
      radius,
      fillColor: col,
      color: 'rgba(255,255,255,0.3)',
      weight: 1.5,
      fillOpacity: 0.75,
    }).addTo(markerLayer).bindPopup(`
      <div style="font-family:Pretendard,sans-serif;min-width:140px;background:#131825;color:#E2E6EF;padding:12px 14px;border-radius:10px;margin:-14px -20px;border:1px solid rgba(255,255,255,0.06)">
        <strong style="font-size:15px;color:#fff">${d.name}</strong>
        <div style="margin-top:8px;font-size:12px;color:#A0A8B8;line-height:1.8">
          인구 <b style="color:#E2E6EF">${d.population.toLocaleString()}명</b><br>
          고령화율 <b style="color:${col}">${d.elderlyRatio}%</b><br>
          사업체 <b style="color:${C.positive}">${d.business.toLocaleString()}개</b><br>
          빈집 <b style="color:${C.negative}">${d.vacantHouse.toLocaleString()}채</b><br>
          의료시설 <b style="color:${C.accent}">${d.medical}개소</b>
        </div>
      </div>
    `, { className: 'dark-popup' });
  });

  if (filtered.length === 1) {
    map.setView([filtered[0].lat, filtered[0].lng], 13);
  } else {
    map.fitBounds(L.latLngBounds(filtered.map(d => [d.lat, d.lng])), { padding: [40, 40] });
  }

  // Charts
  const labels = sorted.map(d => d.name);
  const elderlySorted = [...filtered].sort((a, b) => b.elderlyRatio - a.elderlyRatio);

  if (popChart) popChart.destroy();
  if (elderlyChart) elderlyChart.destroy();
  if (bizChart) bizChart.destroy();
  if (vacantChart) vacantChart.destroy();
  if (medicalChart) medicalChart.destroy();

  const chartOpts = {
    responsive: true,
    plugins: { legend: { display: false } },
  };
  const scaleBase = {
    x: { grid: { display: false }, ticks: { color: C.sub, font: { size: 11 } } },
    y: { beginAtZero: true, grid: { color: C.grid }, ticks: { color: C.sub, font: { size: 11 } } }
  };

  popChart = new Chart(document.getElementById('popChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: sorted.map(d => d.population), backgroundColor: C.primary, borderRadius: 6, hoverBackgroundColor: '#7AA4F7' }]
    },
    options: { ...chartOpts, scales: { ...scaleBase, y: { ...scaleBase.y, ticks: { ...scaleBase.y.ticks, callback: v => v.toLocaleString() } } } }
  });

  elderlyChart = new Chart(document.getElementById('elderlyChart'), {
    type: 'bar',
    data: {
      labels: elderlySorted.map(d => d.name),
      datasets: [{
        data: elderlySorted.map(d => d.elderlyRatio),
        backgroundColor: elderlySorted.map(d => elderlyColor(d.elderlyRatio)),
        borderRadius: 6,
      }]
    },
    options: { ...chartOpts, scales: { ...scaleBase, y: { ...scaleBase.y, ticks: { ...scaleBase.y.ticks, callback: v => v + '%' } } } }
  });

  bizChart = new Chart(document.getElementById('bizChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: sorted.map(d => d.business), backgroundColor: C.positive, borderRadius: 6, hoverBackgroundColor: '#5DD4B8' }]
    },
    options: { ...chartOpts, scales: { ...scaleBase, y: { ...scaleBase.y, ticks: { ...scaleBase.y.ticks, callback: v => v.toLocaleString() } } } }
  });

  const vacantSorted = [...filtered].sort((a, b) => b.vacantHouse - a.vacantHouse);
  vacantChart = new Chart(document.getElementById('vacantChart'), {
    type: 'bar',
    data: {
      labels: vacantSorted.map(d => d.name),
      datasets: [{ data: vacantSorted.map(d => d.vacantHouse), backgroundColor: C.negative, borderRadius: 6, hoverBackgroundColor: '#F08080' }]
    },
    options: { ...chartOpts, scales: { ...scaleBase, y: { ...scaleBase.y, ticks: { ...scaleBase.y.ticks, callback: v => v.toLocaleString() } } } }
  });

  medicalChart = new Chart(document.getElementById('medicalChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(d => d.name),
      datasets: [{ data: sorted.map(d => d.medical), backgroundColor: C.accent, borderRadius: 6, hoverBackgroundColor: '#B5A8ED' }]
    },
    options: { ...chartOpts, scales: { ...scaleBase, y: { ...scaleBase.y, ticks: { ...scaleBase.y.ticks, callback: v => v.toLocaleString() } } } }
  });

  // Table
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';
  sorted.forEach(d => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${d.name}</td>
      <td class="num">${d.population.toLocaleString()}</td>
      <td class="num">${d.elderlyRatio}</td>
      <td class="num">${d.business.toLocaleString()}</td>
      <td class="num">${d.vacantHouse.toLocaleString()}</td>
      <td class="num">${d.medical}</td>
    `;
    tbody.appendChild(tr);
  });
}

loadData();
